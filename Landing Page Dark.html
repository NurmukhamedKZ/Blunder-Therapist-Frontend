<body>
  <div id="root"></div>

/* ─── Dark palette tokens ─── */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#c49a6c",
  "showGMComparison": true,
  "ctaLabel": "Start Your Journey"
}/*EDITMODE-END*/;

/* ── Icons ── */
const IconDNA = () => (

    <path d="M9 4 C9 10 19 10 19 16 C19 22 9 22 9 16" stroke="currentColor" strokeWidth="1.6" fill="none" strokeLinecap="round"/>

);
const IconFire = () => (
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">

  </svg>
);
const IconArrow = () => (
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <line x1="3" y1="9" x2="15" y2="9" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
    <polyline points="10,5 15,9 10,13" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
  </svg>
);

const ChessLogo = ({ size = 22, color = 'currentColor' }) => {
  const cells = [];
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if ((r + c) % 2 === 0) cells.push(
        <rect key={`${r}-${c}`} x={c*(size/4)} y={r*(size/4)} width={size/4} height={size/4} fill={color}/>
      );
    }
  }
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{cells}</svg>;
};

/* ── Nav ── */
const Nav = ({ accent, ctaLabel }) => {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: '0 48px', height: 64,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: scrolled ? 'rgba(14,11,8,0.92)' : 'transparent',
      backdropFilter: scrolled ? 'blur(16px)' : 'none',
      borderBottom: scrolled ? `1px solid ${D.border}` : '1px solid transparent',
      transition: 'all 0.3s ease',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, color: D.text }}>
        <ChessLogo size={24} color={accent} />
        <span style={{ fontFamily: 'DM Sans', fontWeight: 600, fontSize: 16, letterSpacing: '-0.01em' }}>
          Blunder Therapist
        </span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
        {['Features', 'How It Works', 'About'].map(item => (
          <a key={item} href={`#${item.toLowerCase().replace(' ','-')}`} style={{
            fontFamily: 'DM Sans', fontSize: 14, color: D.muted,
            textDecoration: 'none', fontWeight: 400, transition: 'color 0.2s',
          }}
          onMouseEnter={e => e.target.style.color = D.text}
          onMouseLeave={e => e.target.style.color = D.muted}>
            {item}
          </a>
        ))}
        <button style={{
          background: accent, color: '#0e0b08',
          border: 'none', borderRadius: 100, padding: '9px 22px',
          fontFamily: 'DM Sans', fontSize: 14, fontWeight: 600,
          cursor: 'pointer', transition: 'all 0.2s', letterSpacing: '-0.01em',
        }}
        onMouseEnter={e => { e.target.style.opacity = '0.85'; }}
        onMouseLeave={e => { e.target.style.opacity = '1'; }}>
          {ctaLabel}
        </button>
      </div>
    </nav>
  );
};

/* ── Hero ── */
const Hero = ({ accent, ctaLabel }) => (
  <section style={{
    minHeight: '100vh', display: 'flex', flexDirection: 'column',
    alignItems: 'center', justifyContent: 'center',
    padding: '120px 48px 80px', textAlign: 'center', position: 'relative',
  }}>
    {/* Board pattern */}
    <div style={{
      position: 'absolute', inset: 0, opacity: 0.045, pointerEvents: 'none',
      backgroundImage: `repeating-conic-gradient(${D.text} 0% 25%, transparent 0% 50%)`,
      backgroundSize: '40px 40px',
    }} />
    {/* Radial glow */}
    <div style={{
      position: 'absolute', top: '30%', left: '50%', transform: 'translate(-50%,-50%)',
      width: 700, height: 700, borderRadius: '50%', pointerEvents: 'none',
      background: `radial-gradient(circle, ${accent}18 0%, transparent 70%)`,

    <div style={{

      background: `${accent}14`, border: `1px solid ${accent}30`,
      borderRadius: 100, padding: '6px 16px', marginBottom: 40,
      fontSize: 13, fontWeight: 500, color: accent, letterSpacing: '0.02em',

    }}>
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: accent, display: 'inline-block' }} />

    <h1 style={{
      fontFamily: 'Playfair Display', fontSize: 'clamp(52px, 7vw, 96px)',
      fontWeight: 500, lineHeight: 1.08, letterSpacing: '-0.02em',
      color: D.text, maxWidth: 900, marginBottom: 28, position: 'relative',
      textWrap: 'pretty',
    }}>
      Fix Your Psychology,<br />

    <p style={{

      color: D.muted, maxWidth: 540, marginBottom: 48, position: 'relative',
    }}>

    <div style={{ display: 'flex', alignItems: 'center', gap: 16, position: 'relative' }}>
      <button style={{
        background: accent, color: '#0e0b08',

        fontFamily: 'DM Sans', fontSize: 16, fontWeight: 600,
        cursor: 'pointer', transition: 'all 0.25s',

      onMouseEnter={e => { e.currentTarget.style.opacity = '0.88'; e.currentTarget.style.transform = 'translateY(-1px)'; }}

        {ctaLabel} <IconArrow />

      <a href="#features" style={{

      onMouseLeave={e => e.target.style.color = D.muted}>
        See how it works →

    </div>

    {/* Stats */}
    <div style={{
      display: 'flex', alignItems: 'center', gap: 0,
      marginTop: 88, borderTop: `1px solid ${D.border}`, paddingTop: 40,
      position: 'relative',
    }}>
      {[
        { num: '500K+', label: 'Games Analyzed' },
        { num: '12ms', label: 'Real-time Detection' },
        { num: '94%', label: 'Pattern Accuracy' },
        { num: '3.2×', label: 'Faster Improvement' },
      ].map((stat, i) => (
        <React.Fragment key={i}>
          <div style={{ padding: '0 48px', textAlign: 'center' }}>
            <div style={{ fontFamily: 'Playfair Display', fontSize: 36, fontWeight: 500, color: D.text, letterSpacing: '-0.02em' }}>{stat.num}</div>
            <div style={{ fontFamily: 'DM Sans', fontSize: 13, color: D.muted, marginTop: 4, fontWeight: 400 }}>{stat.label}</div>
          </div>
          {i < 3 && <div style={{ width: 1, height: 40, background: D.border }} />}
        </React.Fragment>
      ))}
    </div>
  </section>
);

/* ── Problem ── */
const Problem = ({ accent }) => (

    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center' }}>

/* ── Features ── */
const Features = ({ accent, showGM }) => {

  const features = [
    {
      icon: <IconFire />,
      tag: 'Tilt Detector',
      title: 'Real-time emotional\nstate monitoring',
      desc: 'We analyze move-by-move timing and evaluation deltas as you play. The moment you enter a tilt pattern—panic speed, revenge blundering, analysis paralysis—the system knows.',
      details: ['Thinking time volatility scoring', '"Panic" speed ratio detection', 'Post-game psychological report', 'Emotional recovery tracking'],
      preview: (
        <div style={{ padding: 28, background: D.bgCard2, borderRadius: 14, border: `1px solid ${D.border}` }}>

      icon: <IconDNA />,

      preview: (

              background: msg.role === 'user' ? accent : D.bgDark,
              color: msg.role === 'user' ? '#0e0b08' : D.text,
              borderRadius: msg.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',

/* ── How It Works ── */
const HowItWorks = ({ accent }) => {
